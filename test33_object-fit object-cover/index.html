<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object-Fit and Object-Cover</title>
    <style>
        .container{
            height: 488px;
            width: 466px;
            border: 2px solid black;
            /* background-color: pink; */
            /* background-position: top right; */
            /* background-position: center center; */
            /* background-image: url("https://images.unsplash.com/photo-1575936123452-b67c3203c357?fm=jpg&q=60&w=3000&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8aW1hZ2V8ZW58MHx8MHx8fDA%3D"); */

            /* the below image used will get repeated a sit is small in size and to control this background-repeat command is used */
            background-image: url("https://media.istockphoto.com/id/1419410282/photo/silent-forest-in-spring-with-beautiful-bright-sun-rays.jpg?s=612x612&w=0&k=20&c=UHeb1pGOw6ozr6utsenXHhV19vW6oiPIxDqhKCS2Llk=");
            /* background-repeat: no-repeat; */
            background-repeat: repeat-y;  /*this means it will repeat in y-axis only.*/

            background-clip: border-box;
            /* background-clip: padding-box; */
        }

        img{
            height: 488px;
            width: 466px;
            /* it will cover the height and width given in this image element not related to container element */
            /* object-fit: cover; */
            /* object-position: top right; */
            /* BY DEFAULT PROPERTY OF OBJECT-FIT IS FILL */
            /* object-fit: fill; */
            /* object-fit: scale-down; */
            object-position: 10px 20px;
            /* object-fit: contain; */
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- <img src="https://images.unsplash.com/photo-1575936123452-b67c3203c357?fm=jpg&q=60&w=3000&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8aW1hZ2V8ZW58MHx8MHx8fDA%3D" alt="phtographer image"> -->
    </div>
</body>
</html>
